<div class="page">
  <h1>Courses</h1>

  <!-- Step 91: global spinner bound to the loading interceptor's state -->
  <div class="spinner" *ngIf="loadingService.isLoading$ | async">Loading…</div>

  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <ul class="course-list" *ngIf="!errorMessage">
    <li
      *ngFor="let course of courses"
      [class.selected]="course.id === selectedCourseId"
      (click)="selectCourse(course)"
    >
      <div>
        <strong>{{ course.title }}</strong>
        <span> — {{ course.instructor }} ({{ course.credits }} credits)</span>
      </div>
      <button (click)="deleteCourse(course); $event.stopPropagation()">Delete</button>
    </li>
  </ul>

  <div class="students" *ngIf="selectedCourseId">
    <h2>Enrolled Students</h2>
    <p class="error" *ngIf="studentsError">{{ studentsError }}</p>
    <ul *ngIf="!studentsError">
      <li *ngFor="let student of students">{{ student.name }} — {{ student.email }}</li>
      <li *ngIf="students.length === 0">No students enrolled yet.</li>
    </ul>
  </div>

  <app-course-form (courseCreated)="onCourseCreated($event)"></app-course-form>
</div>
