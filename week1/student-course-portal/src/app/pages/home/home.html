<h1>{{ portalName }}</h1>

<p>Manage your courses and profile.</p>

<!-- Property Binding -->
<button [disabled]="!isPortalActive"
        (click)="onEnrollClick()">
    Enroll Now
</button>

<p>{{ message }}</p>

<hr>

<h3>Course Search</h3>

<!-- Two-way Binding -->
<input
type="text"
[(ngModel)]="searchTerm"
placeholder="Search course">

<p>Searching for: {{ searchTerm }}</p>

<!--
[property]
One-way binding (Component → HTML)

[(ngModel)]
Two-way binding (Component ↔ HTML)
-->
